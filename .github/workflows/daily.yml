name: Daily JSON Update

on:
  schedule:
    - cron: '0 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run script
        run: |
          python generate-daily.py > daily.json

      - name: Commit and push
        run: |
          git add daily.json
          git commit -m "Daily tarot"
          git push
