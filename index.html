<!DOCTYPE html>

<head>
  <meta charset="utf8">
  <title>Mia's Tarot Reader</title>
  <meta name="theme-color" content="#FD7928">
  <link rel="stylesheet" href="static/normalize.css">
  <link rel="stylesheet" href="static/sakura.css" type="text/css">
  <link rel="stylesheet" href="static/style.css" type="text/css">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/icon180.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon512.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/icon16.png">
  <link rel="manifest" href="/static/site.webmanifest">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="src/cards.js"></script>
</head>

<body>
  <div class="bottom-right-gradient"></div>
  <content>
    <h1>
      Draw
      <select id="drawAmount">
        <option value=3>three cards</option>
      </select>
      ...
    </h1>

    <main>
      <article>
        <h3>...from a list</h3>
        <ul id="cardList">
          <li>
            <select><option>Ace of Wands</option></select>
            <button type="button" class="select-upright">upright</button>
          </li>
          <li>
            <select><option>III The High Priestess</option></select>
            <button type="button" class="select-reversed">reversed</button>
          </li>
          <li>
            <select><option>7 of pentacles</option></select>
            <button type="button" class="select-reversed">reversed</button>
          </li>
        </ul>

      </article>

      <article>
        <h3>...at random</h3>
        <form>
          <ul>
            <li>
              <input id="justMajor" type="checkbox"> Draw only the Major Arcana
            </li>
            <li>
              <input id="reversedOk" type="checkbox" checked> Allow cards to be reversed
            </li>
            <button onclick="drawRandom()" type="button">Draw!</button>
          </ul>
        </form>
      </article>
      <noscript>
        It appears you have JavaScript disabled! Apologies; this is a static website, so JS is needed for functionality :(
      </noscript>
      <div id="cardImages">
        <div class="card">
          <img src="cards/Wands01.png">
        </div>
        <div class="card">
          <img src="cards/03-TheEmpress.png" class="reversed">
        </div>
        <div class="card">
          <img src="cards/Pentacles07.png" class="reversed">
        </div>
      </div>
    </main>

    <footer>
      by <a href="https://yunru.se/">Mia</a>
      · <a href="https://github.com/yunruse/tarot">source code</a>
      · <a href="https://creativecommons.org/public-domain/cc0/">public domain</a>
      · <input type="checkbox" onclick="alwaysReverse(this)"> show reversed cards upright in red
      · <button onclick="savePNG()">save as PNG</button>
    </footer>


  </content>
</body>
